<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Book Club</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function BookClubApp() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showUserSelect, setShowUserSelect] = useState(true);
            const clubMembers = ['Sarah', 'Caitlin', 'Laura', 'Sam', 'Beth'];
            const [activeTab, setActiveTab] = useState('current');

            const [currentBook, setCurrentBook] = useState({
                title: 'The Peregrine',
                author: 'J.A. Baker',
                cover: 'https://covers.openlibrary.org/b/isbn/9781590171332-M.jpg',
                description: 'A masterpiece of nature writing that follows the lives of peregrine falcons in the Essex countryside during one unforgettable winter.',
                nextMeeting: 'February 15, 2026',
                genre: 'Nature Writing'
            });

            const [bookProposals, setBookProposals] = useState([
                { id: 1, title: 'The Heart is a Lonely Hunter', author: 'Carson McCullers', genre: 'Fiction', votedBy: ['Sarah', 'Caitlin'], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780618526413-M.jpg' },
                { id: 2, title: 'The Dispossessed', author: 'Ursula K. Le Guin', genre: 'Science Fiction', votedBy: ['Laura'], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780061054884-M.jpg' }
            ]);

            const [meetingProposals, setMeetingProposals] = useState([
                { id: 1, date: 'Feb 15, 2026', time: '7:00 PM', votedBy: ['Sarah', 'Caitlin', 'Laura'] },
                { id: 2, date: 'Feb 22, 2026', time: '6:30 PM', votedBy: ['Sam'] }
            ]);

            const [previousBooks, setPreviousBooks] = useState([
                { id: 1, title: 'Wuthering Heights', author: 'Emily Brontë', cover: 'https://covers.openlibrary.org/b/isbn/9780141439556-M.jpg', genre: 'Classic', meetingDate: 'January 18, 2026' },
                { id: 2, title: 'We Have Always Lived in the Castle', author: 'Shirley Jackson', cover: 'https://covers.openlibrary.org/b/isbn/9780143039976-M.jpg', genre: 'Gothic Fiction', meetingDate: 'December 12, 2025' }
            ]);

            const [mediaItems, setMediaItems] = useState([
                { id: 1, type: 'photo', title: 'January Meeting Photos', url: '' }
            ]);

            const [showModal, setShowModal] = useState(null);
            const [modalData, setModalData] = useState({});

            const handleVote = (type, id) => {
                if (!currentUser) return;
                if (type === 'book') {
                    setBookProposals(bookProposals.map(book => {
                        if (book.id === id) {
                            const hasVoted = book.votedBy.includes(currentUser);
                            return { ...book, votedBy: hasVoted ? book.votedBy.filter(name => name !== currentUser) : [...book.votedBy, currentUser] };
                        }
                        return book;
                    }));
                } else if (type === 'meeting') {
                    setMeetingProposals(meetingProposals.map(meeting => {
                        if (meeting.id === id) {
                            const hasVoted = meeting.votedBy.includes(currentUser);
                            return { ...meeting, votedBy: hasVoted ? meeting.votedBy.filter(name => name !== currentUser) : [...meeting.votedBy, currentUser] };
                        }
                        return meeting;
                    }));
                }
            };

            const handleDelete = (type, id) => {
                if (type === 'book') {
                    setBookProposals(bookProposals.filter(book => book.id !== id));
                } else if (type === 'meeting') {
                    setMeetingProposals(meetingProposals.filter(meeting => meeting.id !== id));
                } else if (type === 'previous') {
                    setPreviousBooks(previousBooks.filter(book => book.id !== id));
                }
            };

            const addBookProposal = () => {
                if (modalData.title && modalData.author) {
                    setBookProposals([...bookProposals, {
                        id: Date.now(),
                        title: modalData.title,
                        author: modalData.author,
                        genre: modalData.genre || 'General',
                        cover: modalData.cover || '',
                        votedBy: [],
                        proposedBy: currentUser
                    }]);
                    setShowModal(null);
                    setModalData({});
                }
            };

            const addMeetingProposal = () => {
                if (modalData.date && modalData.time) {
                    setMeetingProposals([...meetingProposals, {
                        id: Date.now(),
                        date: modalData.date,
                        time: modalData.time,
                        votedBy: []
                    }]);
                    setShowModal(null);
                    setModalData({});
                }
            };

            const addMedia = () => {
                if (modalData.title && modalData.type) {
                    setMediaItems([...mediaItems, {
                        id: Date.now(),
                        title: modalData.title,
                        type: modalData.type,
                        url: modalData.url || ''
                    }]);
                    setShowModal(null);
                    setModalData({});
                }
            };

            const changeCurrentBook = () => {
                if (modalData.title && modalData.author) {
                    setPreviousBooks([{
                        id: Date.now(),
                        title: currentBook.title,
                        author: currentBook.author,
                        cover: currentBook.cover,
                        genre: currentBook.genre,
                        meetingDate: currentBook.nextMeeting
                    }, ...previousBooks]);
                    setCurrentBook({
                        title: modalData.title,
                        author: modalData.author,
                        cover: modalData.cover || '',
                        genre: modalData.genre || 'General',
                        description: modalData.description || '',
                        nextMeeting: modalData.nextMeeting || ''
                    });
                    setShowModal(null);
                    setModalData({});
                }
            };
            return (
                <div className="min-h-screen bg-gradient-to-br from-rose-50 via-pink-50 to-amber-50">
                    {showUserSelect && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl p-8 max-w-md w-full">
                                <h2 className="text-2xl font-serif text-rose-900 mb-4 text-center">Welcome to Book Club!</h2>
                                <p className="text-rose-700 mb-6 text-center">Who are you?</p>
                                <div className="space-y-3">
                                    {clubMembers.map(member => (
                                        <button key={member} onClick={() => { setCurrentUser(member); setShowUserSelect(false); }}
                                            className="w-full px-6 py-3 bg-gradient-to-r from-rose-100 to-amber-100 rounded-lg hover:from-rose-200 hover:to-amber-200 transition-colors text-rose-900 font-medium">
                                            {member}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white bg-opacity-80 backdrop-blur-sm shadow-sm sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-4 py-4">
                            <h1 className="text-3xl font-serif text-rose-900 text-center">📚 Our Cozy Book Club</h1>
                            <p className="text-center text-rose-700 text-sm mt-1">Five friends, endless stories</p>
                            {currentUser && (
                                <div className="flex justify-center mt-2">
                                    <button onClick={() => setShowUserSelect(true)}
                                        className="text-xs px-3 py-1 bg-rose-100 text-rose-700 rounded-full hover:bg-rose-200 transition-colors">
                                        Logged in as {currentUser} • Switch user
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4 mt-6">
                        <div className="flex gap-2 overflow-x-auto pb-2">
                            {[
                                { id: 'current', label: 'Current Book' },
                                { id: 'schedule', label: 'Schedule' },
                                { id: 'proposals', label: 'Book Proposals' },
                                { id: 'previous', label: 'Past Reads' },
                                { id: 'media', label: 'Memories' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-2 rounded-full whitespace-nowrap transition-all ${
                                        activeTab === tab.id ? 'bg-rose-500 text-white shadow-md' : 'bg-white text-rose-700 hover:bg-rose-100'
                                    }`}>
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4 py-8">
                        {activeTab === 'current' && (
                            <div className="bg-white rounded-3xl shadow-lg p-8">
                                <div className="max-w-md mx-auto">
                                    <div className="flex justify-center mb-6">
                                        {currentBook.cover && <img src={currentBook.cover} alt={currentBook.title}
                                            className="rounded-lg shadow-xl w-64 h-96 object-cover"
                                            onError={(e) => { e.target.style.display = 'none'; e.target.nextElementSibling.style.display = 'flex'; }} />}
                                        <div className={`w-64 h-96 bg-gradient-to-br from-rose-200 to-amber-200 rounded-lg shadow-xl flex items-center justify-center ${currentBook.cover ? 'hidden' : 'flex'}`}>
                                            <span style={{fontSize: '64px'}}>📚</span>
                                        </div>
                                    </div>
                                    <div className="text-center mb-6">
                                        <h2 className="text-3xl font-serif text-rose-900 mb-2">{currentBook.title}</h2>
                                        <p className="text-rose-700 text-lg mb-3">by {currentBook.author}</p>
                                        <span className="inline-block px-4 py-2 bg-rose-100 text-rose-700 rounded-full text-sm font-medium">{currentBook.genre}</span>
                                    </div>
                                    <p className="text-gray-700 leading-relaxed mb-6 text-center">{currentBook.description}</p>
                                    <div className="flex justify-center mb-6">
                                        <button onClick={() => setShowModal('changeBook')}
                                            className="flex items-center gap-2 px-6 py-2 bg-rose-500 text-white rounded-full hover:bg-rose-600 transition-colors">
                                            <span>+</span> Change Current Book
                                        </button>
                                    </div>
                                    <div className="bg-gradient-to-r from-rose-100 to-amber-100 rounded-2xl p-6 text-center">
                                        <p className="text-sm text-rose-700 mb-1">📅 Next Meeting</p>
                                        <p className="text-2xl font-semibold text-rose-900">{currentBook.nextMeeting}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-3xl shadow-lg p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-rose-900">Meeting Proposals</h2>
                                    <button onClick={() => setShowModal('meeting')}
                                        className="flex items-center gap-2 px-4 py-2 bg-rose-500 text-white rounded-full hover:bg-rose-600 transition-colors">
                                        <span>+</span> Propose Date
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {meetingProposals.map(meeting => (
                                        <div key={meeting.id} className="bg-gradient-to-r from-rose-50 to-amber-50 rounded-xl p-4">
                                            <div className="flex items-center justify-between mb-3">
                                                <div>
                                                    <p className="font-semibold text-rose-900">{meeting.date}</p>
                                                    <p className="text-sm text-rose-700">{meeting.time}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => handleVote('meeting', meeting.id)}
                                                        className={`flex items-center gap-2 px-4 py-2 rounded-full transition-colors ${
                                                            currentUser && meeting.votedBy.includes(currentUser) ? 'bg-rose-500 text-white' : 'bg-white hover:bg-rose-100'
                                                        }`}>
                                                        <span>👍</span><span className="font-semibold">{meeting.votedBy.length}</span>
                                                    </button>
                                                    <button onClick={() => handleDelete('meeting', meeting.id)}
                                                        className="p-2 bg-white rounded-full hover:bg-red-100 transition-colors">🗑️</button>
                                                </div>
                                            </div>
                                            {meeting.votedBy.length > 0 && (
                                                <p className="text-sm text-rose-700"><span className="font-medium">Voted by:</span> {meeting.votedBy.join(', ')}</p>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'proposals' && (
                            <div className="bg-white rounded-3xl shadow-lg p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-rose-900">Book Proposals</h2>
                                    <button onClick={() => setShowModal('book')}
                                        className="flex items-center gap-2 px-4 py-2 bg-rose-500 text-white rounded-full hover:bg-rose-600 transition-colors">
                                        <span>+</span> Propose Book
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {bookProposals.map(book => (
                                        <div key={book.id} className="bg-gradient-to-r from-rose-50 to-amber-50 rounded-xl p-6">
                                            <div className="flex gap-4">
                                                <div className="flex-shrink-0">
                                                    {book.cover ? <img src={book.cover} alt={book.title} className="w-16 h-24 object-cover rounded shadow-md" /> : 
                                                    <div className="w-16 h-24 bg-rose-200 rounded flex items-center justify-center"><span style={{fontSize: '24px'}}>📚</span></div>}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-start gap-2 mb-2">
                                                        <div className="flex-1">
                                                            <h3 className="text-xl font-semibold text-rose-900">{book.title}</h3>
                                                            <p className="text-rose-700">by {book.author}</p>
                                                            <span className="inline-block mt-2 px-3 py-1 bg-white rounded-full text-xs text-rose-700">{book.genre}</span>
                                                        </div>
                                                        <div className="flex gap-2 flex-shrink-0">
                                                            <button onClick={() => handleVote('book', book.id)}
                                                                className={`flex items-center gap-2 px-4 py-2 rounded-full transition-colors ${
                                                                    currentUser && book.votedBy.includes(currentUser) ? 'bg-rose-500 text-white' : 'bg-white hover:bg-rose-100'
                                                                }`}>
                                                                <span>👍</span><span className="font-semibold">{book.votedBy.length}</span>
                                                            </button>
                                                            <button onClick={() => handleDelete('book', book.id)}
                                                                className="p-2 bg-white rounded-full hover:bg-red-100 transition-colors">🗑️</button>
                                                        </div>
                                                    </div>
                                                    <p className="text-sm text-gray-600">Proposed by {book.proposedBy}</p>
                                                    {book.votedBy.length > 0 && (
                                                        <p className="text-sm text-rose-700 mt-1"><span className="font-medium">Voted by:</span> {book.votedBy.join(', ')}</p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'previous' && (
                            <div className="bg-white rounded-3xl shadow-lg p-8">
                                <h2 className="text-2xl font-serif text-rose-900 mb-6">Our Reading Journey</h2>
                                <div className="space-y-4">
                                    {previousBooks.map(book => (
                                        <div key={book.id} className="bg-gradient-to-r from-rose-50 to-amber-50 rounded-xl p-4">
                                            <div className="flex gap-4">
                                                <div className="flex-shrink-0">
                                                    {book.cover ? <img src={book.cover} alt={book.title} className="w-24 h-36 object-cover rounded-lg shadow-md" /> :
                                                    <div className="w-24 h-36 bg-rose-200 rounded-lg flex items-center justify-center"><span style={{fontSize: '32px'}}>📚</span></div>}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="px-3 py-1 bg-white rounded-full text-xs text-rose-700">{book.genre}</span>
                                                        <button onClick={() => handleDelete('previous', book.id)}
                                                            className="p-2 bg-white rounded-full hover:bg-red-100 transition-colors">🗑️</button>
                                                    </div>
                                                    <h3 className="text-xl font-semibold text-rose-900">{book.title}</h3>
                                                    <p className="text-rose-700 mb-1">by {book.author}</p>
                                                    <p className="text-sm text-gray-600">Discussed: {book.meetingDate}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'media' && (
                            <div className="bg-white rounded-3xl shadow-lg p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-serif text-rose-900">Club Memories</h2>
                                    <button onClick={() => setShowModal('media')}
                                        className="flex items-center gap-2 px-4 py-2 bg-rose-500 text-white rounded-full hover:bg-rose-600 transition-colors">
                                        <span>+</span> Add Media
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {mediaItems.map(item => (
                                        <div key={item.id} className="bg-gradient-to-r from-rose-50 to-amber-50 rounded-xl p-4">
                                            <div className="flex items-center gap-3">
                                                {item.type === 'photo' && <span style={{fontSize: '24px'}}>📷</span>}
                                                {item.type === 'video' && <span style={{fontSize: '24px'}}>▶️</span>}
                                                {item.type === 'article' && <span style={{fontSize: '24px'}}>📄</span>}
                                                <div className="flex-1">
                                                    <p className="font-semibold text-rose-900">{item.title}</p>
                                                    {item.url && <a href={item.url} className="text-sm text-rose-600 hover:underline" target="_blank" rel="noopener noreferrer">View</a>}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                    {showModal === 'book' && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-semibold text-rose-900">Propose a Book</h3>
                                    <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Book Title" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, title: e.target.value})} />
                                    <input type="text" placeholder="Author" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, author: e.target.value})} />
                                    <input type="text" placeholder="Genre (optional)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, genre: e.target.value})} />
                                    <input type="text" placeholder="Cover Image URL (optional)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, cover: e.target.value})} />
                                    <button onClick={addBookProposal} className="w-full bg-rose-500 text-white py-2 rounded-lg hover:bg-rose-600 transition-colors">Add Book</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal === 'meeting' && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-semibold text-rose-900">Propose Meeting Date</h3>
                                    <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Date (e.g., Feb 15, 2026)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, date: e.target.value})} />
                                    <input type="text" placeholder="Time (e.g., 7:00 PM)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, time: e.target.value})} />
                                    <button onClick={addMeetingProposal} className="w-full bg-rose-500 text-white py-2 rounded-lg hover:bg-rose-600 transition-colors">Add Meeting</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal === 'media' && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-semibold text-rose-900">Add Media</h3>
                                    <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Title" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, title: e.target.value})} />
                                    <select className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, type: e.target.value})}>
                                        <option value="">Select Type</option>
                                        <option value="photo">Photo</option>
                                        <option value="video">YouTube Video</option>
                                        <option value="article">Article</option>
                                    </select>
                                    <input type="text" placeholder="URL" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, url: e.target.value})} />
                                    <button onClick={addMedia} className="w-full bg-rose-500 text-white py-2 rounded-lg hover:bg-rose-600 transition-colors">Add Media</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal === 'changeBook' && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-semibold text-rose-900">Change Current Book</h3>
                                    <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                <p className="text-sm text-gray-600 mb-4">The current book will be moved to Past Reads.</p>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Book Title" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, title: e.target.value})} />
                                    <input type="text" placeholder="Author" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, author: e.target.value})} />
                                    <input type="text" placeholder="Genre (optional)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, genre: e.target.value})} />
                                    <input type="text" placeholder="Description (optional)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, description: e.target.value})} />
                                    <input type="text" placeholder="Next Meeting Date (e.g., March 15, 2026)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, nextMeeting: e.target.value})} />
                                    <input type="text" placeholder="Cover Image URL (optional)" className="w-full px-4 py-2 border border-rose-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-300"
                                        onChange={(e) => setModalData({...modalData, cover: e.target.value})} />
                                    <button onClick={changeCurrentBook} className="w-full bg-rose-500 text-white py-2 rounded-lg hover:bg-rose-600 transition-colors">Change Book</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BookClubApp />);
    </script>
</body>
</html>
