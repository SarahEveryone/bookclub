<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Book Club</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://use.typekit.net/af/949f99/00000000000000003b9b3068/27/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=i4&v=3');
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');
        
        .caslon-heading {
            font-family: 'adobe-caslon-pro', serif;
            font-style: italic;
            font-weight: 700;
        }
        
        body, input, select, button, p, span, a, div {
            font-family: 'Crimson Text', serif !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function BookClubApp() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showUserSelect, setShowUserSelect] = useState(true);
            const clubMembers = ['Beth', 'Caitlin', 'Laura', 'Sam', 'Sarah'];
            const [activeTab, setActiveTab] = useState('current');

            const [currentBook, setCurrentBook] = useState({
                title: 'The Peregrine',
                author: 'J.A. Baker',
                cover: 'https://covers.openlibrary.org/b/isbn/9781590171332-M.jpg',
                description: 'A masterpiece of nature writing that follows the lives of peregrine falcons in the Essex countryside during one unforgettable winter.',
                genre: 'Nature Writing'
            });

            const [nextMeeting, setNextMeeting] = useState('TBD');

            const [bookProposals, setBookProposals] = useState([
                { id: 1, title: 'The Grapes of Wrath', author: 'John Steinbeck', genre: ['Fiction', 'Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780143039433-M.jpg' },
                { id: 2, title: 'The Heart is a Lonely Hunter', author: 'Carson McCullers', genre: ['Fiction'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780618526413-M.jpg' },
                { id: 3, title: 'We', author: 'Yevgeny Zamyatin', genre: ['Science Fiction'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780140185850-M.jpg' },
                { id: 4, title: 'On Earth We\'re Briefly Gorgeous', author: 'Ocean Vuong', genre: ['Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780525562023-M.jpg' },
                { id: 5, title: 'Biography of X', author: 'Catherine Lacey', genre: ['Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780374110291-M.jpg' },
                { id: 6, title: 'Martyr!', author: 'Kaveh Akbar', genre: ['Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780593654910-M.jpg' },
                { id: 7, title: 'The Master and Margarita', author: 'Mikhail Bulgakov', genre: ['Fiction', 'Classic'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780679760801-M.jpg' },
                { id: 8, title: 'A Tree Grows in Brooklyn', author: 'Betty Smith', genre: ['Fiction', 'Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780060736262-M.jpg' },
                { id: 9, title: 'Middlemarch', author: 'George Eliot', genre: ['Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780141439549-M.jpg' },
                { id: 10, title: 'One Hundred Years of Solitude', author: 'Gabriel García Márquez', genre: ['Fiction', 'Magical Realism'], votedBy: [], proposedBy: 'Beth', cover: 'https://covers.openlibrary.org/b/isbn/9780060883287-M.jpg' },
                { id: 11, title: 'Self', author: 'Yann Martel', genre: ['Fiction'], votedBy: [], proposedBy: 'Beth', cover: 'https://covers.openlibrary.org/b/isbn/9780156031011-M.jpg' },
                { id: 12, title: 'The Age of Innocence', author: 'Edith Wharton', genre: ['Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780486298030-M.jpg' },
                { id: 13, title: 'Sula', author: 'Toni Morrison', genre: ['Fiction'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9781400033430-M.jpg' },
                { id: 14, title: 'The Left Hand of Darkness', author: 'Ursula K. Le Guin', genre: ['Science Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780441478125-M.jpg' },
                { id: 15, title: 'The Dispossessed', author: 'Ursula K. Le Guin', genre: ['Science Fiction'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780061054884-M.jpg' },
                { id: 16, title: 'A Tale of Two Cities', author: 'Charles Dickens', genre: ['Classic'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780486406510-M.jpg' }
            ]);

            const [meetingProposals, setMeetingProposals] = useState([
                { id: 1, date: 'Feb 21, 2026', time: '7:00 PM', votedBy: [] },
                { id: 2, date: 'Feb 22, 2026', time: '7:00 PM', votedBy: [] },
                { id: 3, date: 'Feb 28, 2026', time: '7:00 PM', votedBy: [] },
                { id: 4, date: 'Mar 1, 2026', time: '7:00 PM', votedBy: [] }
            ]);

            const [previousBooks, setPreviousBooks] = useState([
                { id: 1, title: 'Wuthering Heights', author: 'Emily Brontë', cover: 'https://covers.openlibrary.org/b/isbn/9780141439556-M.jpg', genre: 'Classic', meetingDate: 'January 18, 2026' },
                { id: 2, title: 'We Have Always Lived in the Castle', author: 'Shirley Jackson', cover: 'https://covers.openlibrary.org/b/isbn/9780143039976-M.jpg', genre: 'Gothic Fiction', meetingDate: 'December 12, 2025' }
            ]);

            const [showModal, setShowModal] = useState(null);
            const [modalData, setModalData] = useState({});
            const [bookSort, setBookSort] = useState('votes');
            const [genreFilter, setGenreFilter] = useState('all');
            const [proposerFilter, setProposerFilter] = useState('all');

            const handleVote = (type, id) => {
                if (!currentUser) return;
                if (type === 'book') {
                    setBookProposals(bookProposals.map(book => {
                        if (book.id === id) {
                            const hasVoted = book.votedBy.includes(currentUser);
                            return { ...book, votedBy: hasVoted ? book.votedBy.filter(name => name !== currentUser) : [...book.votedBy, currentUser] };
                        }
                        return book;
                    }));
                } else if (type === 'meeting') {
                    setMeetingProposals(meetingProposals.map(meeting => {
                        if (meeting.id === id) {
                            const hasVoted = meeting.votedBy.includes(currentUser);
                            return { ...meeting, votedBy: hasVoted ? meeting.votedBy.filter(name => name !== currentUser) : [...meeting.votedBy, currentUser] };
                        }
                        return meeting;
                    }));
                }
            };

            const handleDelete = (type, id) => {
                if (type === 'book') {
                    setBookProposals(bookProposals.filter(book => book.id !== id));
                } else if (type === 'meeting') {
                    setMeetingProposals(meetingProposals.filter(meeting => meeting.id !== id));
                } else if (type === 'previous') {
                    setPreviousBooks(previousBooks.filter(book => book.id !== id));
                }
            };

            const addBookProposal = () => {
                if (modalData.title && modalData.author) {
                    const genres = modalData.genre ? modalData.genre.split(',').map(g => g.trim()).filter(g => g) : ['General'];
                    setBookProposals([...bookProposals, {
                        id: Date.now(),
                        title: modalData.title,
                        author: modalData.author,
                        genre: genres,
                        cover: modalData.cover || '',
                        votedBy: [],
                        proposedBy: currentUser
                    }]);
                    setShowModal(null);
                    setModalData({});
                }
            };

            const editBookProposal = () => {
                if (modalData.title && modalData.author) {
                    const genres = modalData.genre ? modalData.genre.split(',').map(g => g.trim()).filter(g => g) : ['General'];
                    setBookProposals(bookProposals.map(book => 
                        book.id === modalData.id ? {
                            ...book,
                            title: modalData.title,
                            author: modalData.author,
                            genre: genres,
                            cover: modalData.cover || book.cover
                        } : book
                    ));
                    setShowModal(null);
                    setModalData({});
                }
            };

            const addMeetingProposal = () => {
                if (modalData.date && modalData.time) {
                    setMeetingProposals([...meetingProposals, {
                        id: Date.now(),
                        date: modalData.date,
                        time: modalData.time,
                        votedBy: []
                    }]);
                    setShowModal(null);
                    setModalData({});
                }
            };

            const changeCurrentBook = () => {
                if (modalData.title && modalData.author) {
                    setPreviousBooks([{
                        id: Date.now(),
                        title: currentBook.title,
                        author: currentBook.author,
                        cover: currentBook.cover,
                        genre: currentBook.genre,
                        meetingDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                    }, ...previousBooks]);

                    setCurrentBook({
                        title: modalData.title,
                        author: modalData.author,
                        cover: modalData.cover || '',
                        description: modalData.description || '',
                        genre: modalData.genre || 'General'
                    });
                    setShowModal(null);
                    setModalData({});
                }
            };

            const updateMeetingDate = () => {
                if (modalData.meetingDate) {
                    setNextMeeting(modalData.meetingDate);
                    setShowModal(null);
                    setModalData({});
                }
            };

            if (showUserSelect) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">📚</div>
                                <h1 className="text-3xl font-bold mb-2 caslon-heading" style={{color: '#003631'}}>Cozy Book Club</h1>
                                <p className="text-gray-600">Select your name to continue</p>
                            </div>
                            <div className="space-y-3">
                                {clubMembers.map(member => (
                                    <button
                                        key={member}
                                        onClick={() => { setCurrentUser(member); setShowUserSelect(false); }}
                                        className="w-full py-3 px-4 rounded-xl transition-all transform hover:scale-105 font-medium text-white"
                                        style={{backgroundColor: '#003631'}}
                                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                    >
                                        {member}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                    <div className="max-w-6xl mx-auto px-4 py-8">
                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden">
                            <div className="p-8 text-white" style={{background: 'linear-gradient(to right, #003631, #004d45)'}}>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h1 className="text-4xl font-bold mb-2 caslon-heading">📚 Cozy Book Club</h1>
                                        <p style={{color: '#FFEDA8'}}>Welcome back, {currentUser}!</p>
                                    </div>
                                    <button 
                                        onClick={() => setShowUserSelect(true)}
                                        className="bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg transition-colors"
                                    >
                                        Switch User
                                    </button>
                                </div>
                            </div>

                            <div className="flex border-b border-gray-200">
                                {['current', 'proposals', 'meetings', 'history'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`flex-1 py-4 px-6 font-medium transition-colors ${
                                            activeTab === tab
                                                ? 'border-b-2'
                                                : 'text-gray-600 hover:bg-gray-50'
                                        }`}
                                        style={activeTab === tab ? {backgroundColor: '#FFEDA8', color: '#003631', borderColor: '#003631'} : {}}
                                    >
                                        {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'current' && (
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold mb-6 caslon-heading" style={{color: '#003631'}}>Current Read</h2>
                                    <div className="rounded-2xl p-8" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                                        <div className="flex flex-col items-center">
                                            <img src={currentBook.cover} alt={currentBook.title} className="w-48 h-72 object-cover rounded-xl shadow-lg mb-6" />
                                            <div className="w-full text-center">
                                                <h3 className="text-3xl font-bold mb-2 caslon-heading" style={{color: '#003631'}}>{currentBook.title}</h3>
                                                <p className="text-xl text-gray-700 mb-3">by {currentBook.author}</p>
                                                <span className="inline-block px-3 py-1 rounded-full text-sm font-medium mb-4 text-white" style={{backgroundColor: '#003631'}}>{currentBook.genre}</span>
                                                <p className="text-gray-600 leading-relaxed mb-6">{currentBook.description}</p>
                                                <button
                                                    onClick={() => setShowModal('changeBook')}
                                                    className="px-4 py-2 rounded-lg transition-colors text-white"
                                                    style={{backgroundColor: '#003631'}}
                                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                                >
                                                    Change Book
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-6">
                                        <h2 className="text-2xl font-bold mb-4 caslon-heading" style={{color: '#003631'}}>Next Meeting</h2>
                                        <div className="rounded-2xl p-6 text-center" style={{background: 'linear-gradient(to bottom right, #FFF4CC, #FFFAEB)'}}>
                                            <div className="text-5xl mb-3">✨</div>
                                            <p className="text-2xl font-bold mb-4" style={{color: '#003631'}}>{nextMeeting}</p>
                                            <button
                                                onClick={() => setShowModal('changeMeeting')}
                                                className="px-4 py-2 rounded-lg transition-colors text-white"
                                                style={{backgroundColor: '#003631'}}
                                                onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                                onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                            >
                                                Update Meeting
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'proposals' && (
                                <div className="p-8">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold caslon-heading" style={{color: '#003631'}}>Book Proposals</h2>
                                        <button
                                            onClick={() => setShowModal('book')}
                                            className="px-4 py-2 rounded-lg transition-colors text-white"
                                            style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                        >
                                            + Propose Book
                                        </button>
                                    </div>
                                    
                                    <div className="mb-6 flex gap-4 flex-wrap">
                                        <div>
                                            <label className="text-sm text-gray-600 mb-1 block">Sort by:</label>
                                            <select 
                                                value={bookSort} 
                                                onChange={(e) => setBookSort(e.target.value)}
                                                className="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
                                                style={{borderColor: '#FFEDA8'}}
                                            >
                                                <option value="votes">Most Votes</option>
                                                <option value="title">Title (A-Z)</option>
                                                <option value="author">Author (A-Z)</option>
                                                <option value="genre">Genre</option>
                                                <option value="proposer">Proposed By</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-sm text-gray-600 mb-1 block">Filter by genre:</label>
                                            <select 
                                                value={genreFilter} 
                                                onChange={(e) => setGenreFilter(e.target.value)}
                                                className="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
                                                style={{borderColor: '#FFEDA8'}}
                                            >
                                                <option value="all">All Genres</option>
                                                <option value="Fiction">Fiction</option>
                                                <option value="Science Fiction">Science Fiction</option>
                                                <option value="Classic">Classic</option>
                                                <option value="Magical Realism">Magical Realism</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-sm text-gray-600 mb-1 block">Filter by proposer:</label>
                                            <select 
                                                value={proposerFilter} 
                                                onChange={(e) => setProposerFilter(e.target.value)}
                                                className="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
                                                style={{borderColor: '#FFEDA8'}}
                                            >
                                                <option value="all">All Members</option>
                                                <option value="Sarah">Sarah</option>
                                                <option value="Caitlin">Caitlin</option>
                                                <option value="Laura">Laura</option>
                                                <option value="Sam">Sam</option>
                                                <option value="Beth">Beth</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="grid gap-4">
                                        {bookProposals
                                            .filter(book => genreFilter === 'all' || book.genre.includes(genreFilter))
                                            .filter(book => proposerFilter === 'all' || book.proposedBy === proposerFilter)
                                            .sort((a, b) => {
                                                if (bookSort === 'votes') return b.votedBy.length - a.votedBy.length;
                                                if (bookSort === 'title') return a.title.localeCompare(b.title);
                                                if (bookSort === 'author') return a.author.localeCompare(b.author);
                                                if (bookSort === 'genre') return a.genre[0].localeCompare(b.genre[0]);
                                                if (bookSort === 'proposer') return a.proposedBy.localeCompare(b.proposedBy);
                                                return 0;
                                            })
                                            .map(book => (
                                            <div key={book.id} className="rounded-xl p-6 flex gap-6 items-start" style={{background: 'linear-gradient(to right, #FFEDA8, #FFF4CC)'}}>
                                                {book.cover && <img src={book.cover} alt={book.title} className="w-24 h-36 object-cover rounded-lg shadow" />}
                                                <div className="flex-1">
                                                    <h3 className="text-xl font-bold caslon-heading" style={{color: '#003631'}}>{book.title}</h3>
                                                    <p className="text-gray-700 mb-2">by {book.author}</p>
                                                    <div className="flex items-center gap-2 mb-3 flex-wrap">
                                                        {book.genre.map((g, idx) => (
                                                            <span key={idx} className="px-2 py-1 rounded text-sm text-white" style={{backgroundColor: '#003631'}}>{g}</span>
                                                        ))}
                                                        <span className="text-sm text-gray-600">Proposed by {book.proposedBy}</span>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <button
                                                            onClick={() => handleVote('book', book.id)}
                                                            className={`px-4 py-2 rounded-lg transition-colors ${
                                                                book.votedBy.includes(currentUser)
                                                                    ? 'text-white'
                                                                    : 'bg-white border-2 hover:bg-gray-50'
                                                            }`}
                                                            style={book.votedBy.includes(currentUser) ? {backgroundColor: '#003631'} : {borderColor: '#003631', color: '#003631'}}
                                                        >
                                                            {book.votedBy.includes(currentUser) ? '✓ Voted' : 'Vote'} ({book.votedBy.length})
                                                        </button>
                                                        <span className="text-sm text-gray-600">
                                                            {book.votedBy.length > 0 && `Voted by: ${book.votedBy.join(', ')}`}
                                                        </span>
                                                        <button
                                                            onClick={() => {
                                                                setModalData({
                                                                    id: book.id,
                                                                    title: book.title,
                                                                    author: book.author,
                                                                    genre: book.genre.join(', '),
                                                                    cover: book.cover
                                                                });
                                                                setShowModal('editBook');
                                                            }}
                                                            className="ml-auto text-blue-600 hover:text-blue-800"
                                                        >
                                                            Edit
                                                        </button>
                                                        <button
                                                            onClick={() => handleDelete('book', book.id)}
                                                            className="text-red-500 hover:text-red-700"
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'meetings' && (
                                <div className="p-8">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold caslon-heading" style={{color: '#003631'}}>Meeting Proposals</h2>
                                        <button
                                            onClick={() => setShowModal('meeting')}
                                            className="px-4 py-2 rounded-lg transition-colors text-white"
                                            style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                        >
                                            + Propose Meeting
                                        </button>
                                    </div>
                                    <div className="grid gap-4">
                                        {meetingProposals.map(meeting => (
                                            <div key={meeting.id} className="rounded-xl p-6" style={{background: 'linear-gradient(to right, #FFEDA8, #FFF4CC)'}}>
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <h3 className="text-xl font-bold caslon-heading" style={{color: '#003631'}}>{meeting.date}</h3>
                                                        <p className="text-gray-700">{meeting.time}</p>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <button
                                                            onClick={() => handleVote('meeting', meeting.id)}
                                                            className={`px-4 py-2 rounded-lg transition-colors ${
                                                                meeting.votedBy.includes(currentUser)
                                                                    ? 'text-white'
                                                                    : 'bg-white border-2 hover:bg-gray-50'
                                                            }`}
                                                            style={meeting.votedBy.includes(currentUser) ? {backgroundColor: '#003631'} : {borderColor: '#003631', color: '#003631'}}
                                                        >
                                                            {meeting.votedBy.includes(currentUser) ? '✓ Voted' : 'Vote'} ({meeting.votedBy.length})
                                                        </button>
                                                        <span className="text-sm text-gray-600">
                                                            {meeting.votedBy.length > 0 && `${meeting.votedBy.join(', ')}`}
                                                        </span>
                                                        <button
                                                            onClick={() => handleDelete('meeting', meeting.id)}
                                                            className="text-red-500 hover:text-red-700"
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold mb-6 caslon-heading" style={{color: '#003631'}}>Past Reads</h2>
                                    <div className="grid gap-4">
                                        {previousBooks.map(book => (
