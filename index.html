<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Book Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://use.typekit.net/af/949f99/00000000000000003b9b3068/27/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=i4&v=3');

            background-color: #FFEDA8;
            background-image: 
                linear-gradient(45deg, #FFF4CC 25%, transparent 25%), 
                linear-gradient(-45deg, #FFF4CC 25%, transparent 25%),

            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

</head>
<body>
    <div id="root"></div>

    <!-- Load React, ReactDOM, and Babel first -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaZl3d4hXSBmF2CvvSs74No3NaIoJTvu4",
            authDomain: "bookclub-81dd2.firebaseapp.com",
            databaseURL: "https://bookclub-81dd2-default-rtdb.firebaseio.com",
            projectId: "bookclub-81dd2",
            storageBucket: "bookclub-81dd2.firebasestorage.app",
            messagingSenderId: "967085253070",
            appId: "1:967085253070:web:349d94017af80b51578b9f"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Make Firebase available globally for React app
        window.firebaseDb = database;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebasePush = push;
        window.firebaseRemove = remove;
        window.firebaseUpdate = update;

        // Initialize default data if database is empty
        const dbRef = ref(database);
        onValue(dbRef, (snapshot) => {
            if (!snapshot.exists()) {
                set(dbRef, {
                    currentBook: {
                        title: 'The Peregrine',
                        author: 'J.A. Baker',
                        cover: 'https://covers.openlibrary.org/b/isbn/9781590171332-M.jpg',
                        description: 'A masterpiece of nature writing that follows the lives of peregrine falcons in the Essex countryside during one unforgettable winter.',
                        genre: 'Nature Writing'
                    },
                    nextMeeting: 'TBD',
                    bookProposals: {
                        '1': { title: 'The Grapes of Wrath', author: 'John Steinbeck', genre: ['Fiction', 'Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780143039433-M.jpg' },
                        '2': { title: 'The Heart is a Lonely Hunter', author: 'Carson McCullers', genre: ['Fiction'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780618526413-M.jpg' },
                        '3': { title: 'We', author: 'Yevgeny Zamyatin', genre: ['Science Fiction'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780140185850-M.jpg' },
                        '4': { title: 'On Earth We\'re Briefly Gorgeous', author: 'Ocean Vuong', genre: ['Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780525562023-M.jpg' },
                        '5': { title: 'Biography of X', author: 'Catherine Lacey', genre: ['Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780374110291-M.jpg' },
                        '6': { title: 'Martyr!', author: 'Kaveh Akbar', genre: ['Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780593654910-M.jpg' },
                        '7': { title: 'The Master and Margarita', author: 'Mikhail Bulgakov', genre: ['Fiction', 'Classic'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780679760801-M.jpg' },
                        '8': { title: 'A Tree Grows in Brooklyn', author: 'Betty Smith', genre: ['Fiction', 'Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780060736262-M.jpg' },
                        '9': { title: 'Middlemarch', author: 'George Eliot', genre: ['Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780141439549-M.jpg' },
                        '10': { title: 'One Hundred Years of Solitude', author: 'Gabriel García Márquez', genre: ['Fiction', 'Magical Realism'], votedBy: [], proposedBy: 'Beth', cover: 'https://covers.openlibrary.org/b/isbn/9780060883287-M.jpg' },
                        '11': { title: 'Self', author: 'Yann Martel', genre: ['Fiction'], votedBy: [], proposedBy: 'Beth', cover: 'https://covers.openlibrary.org/b/isbn/9780156031011-M.jpg' },
                        '12': { title: 'The Age of Innocence', author: 'Edith Wharton', genre: ['Classic'], votedBy: [], proposedBy: 'Laura', cover: 'https://covers.openlibrary.org/b/isbn/9780486298030-M.jpg' },
                        '13': { title: 'Sula', author: 'Toni Morrison', genre: ['Fiction'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9781400033430-M.jpg' },
                        '14': { title: 'The Left Hand of Darkness', author: 'Ursula K. Le Guin', genre: ['Science Fiction'], votedBy: [], proposedBy: 'Caitlin', cover: 'https://covers.openlibrary.org/b/isbn/9780441478125-M.jpg' },
                        '15': { title: 'The Dispossessed', author: 'Ursula K. Le Guin', genre: ['Science Fiction'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780061054884-M.jpg' },
                        '16': { title: 'A Tale of Two Cities', author: 'Charles Dickens', genre: ['Classic'], votedBy: [], proposedBy: 'Sarah', cover: 'https://covers.openlibrary.org/b/isbn/9780486406510-M.jpg' }
                    },
                    meetingProposals: {
                        '1': { date: 'Feb 21, 2026', time: '7:00 PM', votedBy: [] },
                        '2': { date: 'Feb 22, 2026', time: '7:00 PM', votedBy: [] },
                        '3': { date: 'Feb 28, 2026', time: '7:00 PM', votedBy: [] },
                        '4': { date: 'Mar 1, 2026', time: '7:00 PM', votedBy: [] }
                    },
                    previousBooks: {
                        '1': { title: 'Wuthering Heights', author: 'Emily Brontë', cover: 'https://covers.openlibrary.org/b/isbn/9780141439556-M.jpg', genre: 'Classic', meetingDate: 'January 18, 2026' },
                        '2': { title: 'We Have Always Lived in the Castle', author: 'Shirley Jackson', cover: 'https://covers.openlibrary.org/b/isbn/9780143039976-M.jpg', genre: 'Gothic Fiction', meetingDate: 'December 12, 2025' }
                    }
                });
            }
        }, { onlyOnce: true });

        console.log('Firebase initialized successfully');
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function BookClubApp() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const CORRECT_PASSWORD = 'millcreek69'; // Change this to your desired password
            
            const [currentUser, setCurrentUser] = useState(null);
            const [showUserSelect, setShowUserSelect] = useState(true);
            const clubMembers = ['Beth', 'Caitlin', 'Laura', 'Sam', 'Sarah'];
            
            // Initialize activeTab from URL hash, or default to 'current'
            const getTabFromURL = () => {
                const hash = window.location.hash.replace('#', '');
                const validTabs = ['current', 'proposals', 'meetings', 'history'];
                return validTabs.includes(hash) ? hash : 'current';
            };
            
            const [activeTab, setActiveTab] = useState(getTabFromURL());

            // Update URL when tab changes
            const changeTab = (tab) => {
                setActiveTab(tab);
                window.location.hash = tab;
            };

            // Tab display names
            const tabLabels = {
                'current': 'Current',
                'proposals': 'Proposals',
                'meetings': 'Schedule',
                'history': 'History'
            };

            // Listen for browser back/forward button
            useEffect(() => {
                const handleHashChange = () => {
                    setActiveTab(getTabFromURL());
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const [currentBook, setCurrentBook] = useState(null);
            const [nextMeeting, setNextMeeting] = useState('');
            const [bookProposals, setBookProposals] = useState([]);
            const [meetingProposals, setMeetingProposals] = useState([]);
            const [previousBooks, setPreviousBooks] = useState([]);

            const [showModal, setShowModal] = useState(null);
            const [modalData, setModalData] = useState({});
            const [bookSort, setBookSort] = useState('votes');
            const [genreFilter, setGenreFilter] = useState('all');
            const [proposerFilter, setProposerFilter] = useState('all');

            // Listen to Firebase data
            useEffect(() => {
                const db = window.firebaseDb;
                const ref = window.firebaseRef;
                const onValue = window.firebaseOnValue;

                const currentBookRef = ref(db, 'currentBook');
                onValue(currentBookRef, (snapshot) => {
                    setCurrentBook(snapshot.val());
                });

                const nextMeetingRef = ref(db, 'nextMeeting');
                onValue(nextMeetingRef, (snapshot) => {
                    setNextMeeting(snapshot.val() || 'TBD');
                });

                const bookProposalsRef = ref(db, 'bookProposals');
                onValue(bookProposalsRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const books = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        }));
                        setBookProposals(books);
                    } else {
                        setBookProposals([]);
                    }
                });

                const meetingProposalsRef = ref(db, 'meetingProposals');
                onValue(meetingProposalsRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const meetings = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        }));
                        setMeetingProposals(meetings);
                    } else {
                        setMeetingProposals([]);
                    }
                });

                const previousBooksRef = ref(db, 'previousBooks');
                onValue(previousBooksRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const books = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        }));
                        setPreviousBooks(books);
                    } else {
                        setPreviousBooks([]);
                    }
                });
            }, []);

            const handleVote = (type, id) => {
                if (!currentUser) return;
                
                const db = window.firebaseDb;
                const ref = window.firebaseRef;
                const update = window.firebaseUpdate;

                if (type === 'book') {
                    const book = bookProposals.find(b => b.id === id);
                    if (!book) return;
                    const votedBy = book.votedBy || [];
                    const hasVoted = votedBy.includes(currentUser);
                    const newVotedBy = hasVoted 
                        ? votedBy.filter(name => name !== currentUser)
                        : [...votedBy, currentUser];
                    
                    update(ref(db, `bookProposals/${id}`), {
                        votedBy: newVotedBy
                    });
                } else if (type === 'meeting') {
                    const meeting = meetingProposals.find(m => m.id === id);
                    if (!meeting) return;
                    const votedBy = meeting.votedBy || [];
                    const hasVoted = votedBy.includes(currentUser);
                    const newVotedBy = hasVoted 
                        ? votedBy.filter(name => name !== currentUser)
                        : [...votedBy, currentUser];
                    
                    update(ref(db, `meetingProposals/${id}`), {
                        votedBy: newVotedBy
                    });
                }
            };

            const handleDelete = (type, id) => {
                const db = window.firebaseDb;
                const ref = window.firebaseRef;
                const remove = window.firebaseRemove;

                if (type === 'book') {
                    remove(ref(db, `bookProposals/${id}`));
                } else if (type === 'meeting') {
                    remove(ref(db, `meetingProposals/${id}`));
                } else if (type === 'previous') {
                    remove(ref(db, `previousBooks/${id}`));
                }
            };

            const addBookProposal = () => {
                if (modalData.title && modalData.author) {
                    const db = window.firebaseDb;
                    const ref = window.firebaseRef;
                    const push = window.firebasePush;
                    const set = window.firebaseSet;

                    const genres = modalData.genre ? modalData.genre.split(',').map(g => g.trim()).filter(g => g) : ['General'];
                    const newBookRef = push(ref(db, 'bookProposals'));
                    set(newBookRef, {
                        title: modalData.title,
                        author: modalData.author,
                        genre: genres,
                        cover: modalData.cover || '',
                        votedBy: [],
                        proposedBy: currentUser
                    });
                    setShowModal(null);
                    setModalData({});
                }
            };

            const editBookProposal = () => {
                if (modalData.title && modalData.author) {
                    const db = window.firebaseDb;
                    const ref = window.firebaseRef;
                    const update = window.firebaseUpdate;

                    const genres = modalData.genre ? modalData.genre.split(',').map(g => g.trim()).filter(g => g) : ['General'];
                    const book = bookProposals.find(b => b.id === modalData.id);
                    update(ref(db, `bookProposals/${modalData.id}`), {
                        title: modalData.title,
                        author: modalData.author,
                        genre: genres,
                        cover: modalData.cover || book.cover
                    });
                    setShowModal(null);
                    setModalData({});
                }
            };

            const addMeetingProposal = () => {
                if (modalData.date && modalData.time) {
                    const db = window.firebaseDb;
                    const ref = window.firebaseRef;
                    const push = window.firebasePush;
                    const set = window.firebaseSet;

                    const newMeetingRef = push(ref(db, 'meetingProposals'));
                    set(newMeetingRef, {
                        date: modalData.date,
                        time: modalData.time,
                        votedBy: []
                    });
                    setShowModal(null);
                    setModalData({});
                }
            };

            const changeCurrentBook = () => {
                if (modalData.title && modalData.author) {
                    const db = window.firebaseDb;
                    const ref = window.firebaseRef;
                    const push = window.firebasePush;
                    const set = window.firebaseSet;

                    // Move current book to previous
                    const newPrevBookRef = push(ref(db, 'previousBooks'));
                    set(newPrevBookRef, {
                        title: currentBook.title,
                        author: currentBook.author,
                        cover: currentBook.cover,
                        genre: currentBook.genre,
                        meetingDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                    });

                    // Set new current book
                    set(ref(db, 'currentBook'), {
                        title: modalData.title,
                        author: modalData.author,
                        cover: modalData.cover || '',
                        description: modalData.description || '',
                        genre: modalData.genre || 'General'
                    });
                    
                    setShowModal(null);
                    setModalData({});
                }
            };

            const updateMeetingDate = () => {
                if (modalData.meetingDate) {
                    const db = window.firebaseDb;
                    const ref = window.firebaseRef;
                    const set = window.firebaseSet;

                    set(ref(db, 'nextMeeting'), modalData.meetingDate);
                    setShowModal(null);
                    setModalData({});
                }
            };

            if (!currentBook) {
                return (
                    <div className="min-h-screen flex items-center justify-center gingham-bg">
                        <div className="text-2xl" style={{color: '#003631'}}>Loading...</div>
                    </div>
                );
            }

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === CORRECT_PASSWORD) {
                    setIsAuthenticated(true);
                    setPasswordError('');
                } else {
                    setPasswordError('Incorrect password. Please try again.');
                    setPasswordInput('');
                }
            };

            // Password screen
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">📚</div>
                                <h1 className="text-3xl font-bold mb-2 caslon-heading" style={{color: '#003631'}}>Cozy Book Club</h1>
                                <p className="text-gray-600">Enter password to continue</p>
                            </div>
                            <form onSubmit={handlePasswordSubmit} className="space-y-4">
                                <div>
                                    <input
                                        type="password"
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        placeholder="Password"
                                        className="w-full py-3 px-4 rounded-xl border-2 border-gray-300 focus:border-opacity-50 focus:outline-none transition-colors"
                                        style={{borderColor: passwordError ? '#dc2626' : undefined, focusBorderColor: '#003631'}}
                                        autoFocus
                                    />
                                    {passwordError && (
                                        <p className="text-red-600 text-sm mt-2">{passwordError}</p>
                                    )}
                                </div>
                                <button
                                    type="submit"
                                    className="w-full py-3 px-4 rounded-xl transition-all transform hover:scale-105 font-medium text-white"
                                    style={{backgroundColor: '#003631'}}
                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                >
                                    Enter
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // User selection screen
            if (showUserSelect) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">📚</div>
                                <h1 className="text-3xl font-bold mb-2 caslon-heading" style={{color: '#003631'}}>Cozy Book Club</h1>
                                <p className="text-gray-600">Select your name to continue</p>
                            </div>
                            <div className="space-y-3">
                                {clubMembers.map(member => (
                                    <button
                                        key={member}
                                        onClick={() => { setCurrentUser(member); setShowUserSelect(false); }}
                                        className="w-full py-3 px-4 rounded-xl transition-all transform hover:scale-105 font-medium text-white"
                                        style={{backgroundColor: '#003631'}}
                                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                    >
                                        {member}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                    <div className="max-w-6xl mx-auto px-4 py-8">
                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden">
                            <div className="p-6 sm:p-8 text-white" style={{background: 'linear-gradient(to right, #003631, #004d45)'}}>
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                                    <div>
                                        <h1 className="text-3xl sm:text-4xl font-bold mb-2 caslon-heading">📚 Cozy Book Club</h1>
                                        <p style={{color: '#FFEDA8'}}>Welcome back, {currentUser}!</p>
                                    </div>
                                    <button 
                                        onClick={() => setShowUserSelect(true)}
                                        className="bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg transition-colors w-fit"
                                    >
                                        Switch User
                                    </button>
                                </div>
                            </div>

                            <div className="flex border-b border-gray-200 overflow-x-auto">
                                {['current', 'proposals', 'meetings', 'history'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => changeTab(tab)}
                                        className={`flex-1 min-w-fit py-4 px-4 sm:px-6 font-medium transition-colors whitespace-nowrap ${
                                            activeTab === tab
                                                ? 'border-b-2'
                                                : 'text-gray-600 hover:bg-gray-50'
                                        }`}
                                        style={activeTab === tab ? {backgroundColor: '#FFEDA8', color: '#003631', borderColor: '#003631'} : {}}
                                    >
                                        {tabLabels[tab]}
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'current' && (
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold mb-6 caslon-heading" style={{color: '#003631'}}>Current Read</h2>
                                    <div className="rounded-2xl p-8" style={{background: 'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                                        <div className="flex flex-col items-center">
                                            <img src={currentBook.cover} alt={currentBook.title} className="w-48 h-72 object-cover rounded-xl shadow-lg mb-6" />
                                            <div className="w-full text-center">
                                                <h3 className="text-3xl font-bold mb-2 caslon-heading" style={{color: '#003631'}}>{currentBook.title}</h3>
                                                <p className="text-xl text-gray-700 mb-3">by {currentBook.author}</p>
                                                <span className="inline-block px-3 py-1 rounded-full text-sm font-medium mb-4 text-white" style={{backgroundColor: '#003631'}}>{currentBook.genre}</span>
                                                <p className="text-gray-600 leading-relaxed mb-6">{currentBook.description}</p>
                                                <button
                                                    onClick={() => setShowModal('changeBook')}
                                                    className="px-4 py-2 rounded-lg transition-colors text-white"
                                                    style={{backgroundColor: '#003631'}}
                                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                                >
                                                    Change Book
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-6">
                                        <h2 className="text-2xl font-bold mb-4 caslon-heading" style={{color: '#003631'}}>Next Meeting</h2>
                                        <div className="rounded-2xl p-6 text-center" style={{background: 'linear-gradient(to bottom right, #FFF4CC, #FFFAEB)'}}>
                                            <div className="text-5xl mb-3">✨</div>
                                            <p className="text-2xl font-bold mb-4" style={{color: '#003631'}}>{nextMeeting}</p>
                                            <button
                                                onClick={() => setShowModal('changeMeeting')}
                                                className="px-4 py-2 rounded-lg transition-colors text-white"
                                                style={{backgroundColor: '#003631'}}
                                                onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                                onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                            >
                                                Update Meeting
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'proposals' && (
                                <div className="p-8">
                                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">
                                        <h2 className="text-2xl font-bold caslon-heading" style={{color: '#003631'}}>Book Proposals</h2>
                                        <button
                                            onClick={() => setShowModal('book')}
                                            className="w-full sm:w-auto px-4 py-2 rounded-lg transition-colors text-white"
                                            style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                        >
                                            + Propose Book
                                        </button>
                                    </div>
                                    
                                    <div className="mb-6 flex flex-col sm:flex-row gap-4 flex-wrap">
                                        <div className="w-full sm:w-auto">
                                            <label className="text-sm text-gray-600 mb-1 block">Sort by:</label>
                                            <select 
                                                value={bookSort} 
                                                onChange={(e) => setBookSort(e.target.value)}
                                                className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
                                                style={{borderColor: '#FFEDA8'}}
                                            >
                                                <option value="votes">Most Votes</option>
                                                <option value="title">Title (A-Z)</option>
                                                <option value="author">Author (A-Z)</option>
                                                <option value="genre">Genre</option>
                                                <option value="proposer">Proposed By</option>
                                            </select>
                                        </div>
                                        <div className="w-full sm:w-auto">
                                            <label className="text-sm text-gray-600 mb-1 block">Filter by genre:</label>
                                            <select 
                                                value={genreFilter} 
                                                onChange={(e) => setGenreFilter(e.target.value)}
                                                className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
                                                style={{borderColor: '#FFEDA8'}}
                                            >
                                                <option value="all">All Genres</option>
                                                <option value="Fiction">Fiction</option>
                                                <option value="Science Fiction">Science Fiction</option>
                                                <option value="Classic">Classic</option>
                                                <option value="Magical Realism">Magical Realism</option>
                                            </select>
                                        </div>
                                        <div className="w-full sm:w-auto">
                                            <label className="text-sm text-gray-600 mb-1 block">Filter by proposer:</label>
                                            <select 
                                                value={proposerFilter} 
                                                onChange={(e) => setProposerFilter(e.target.value)}
                                                className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
                                                style={{borderColor: '#FFEDA8'}}
                                            >
                                                <option value="all">All Members</option>
                                                <option value="Sarah">Sarah</option>
                                                <option value="Caitlin">Caitlin</option>
                                                <option value="Laura">Laura</option>
                                                <option value="Sam">Sam</option>
                                                <option value="Beth">Beth</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="grid gap-4">
                                        {bookProposals
                                            .filter(book => {
                                                if (genreFilter === 'all') return true;
                                                const genres = Array.isArray(book.genre) ? book.genre : [book.genre];
                                                return genres.includes(genreFilter);
                                            })
                                            .filter(book => proposerFilter === 'all' || book.proposedBy === proposerFilter)
                                            .sort((a, b) => {
                                                if (bookSort === 'votes') return (b.votedBy || []).length - (a.votedBy || []).length;
                                                if (bookSort === 'title') return a.title.localeCompare(b.title);
                                                if (bookSort === 'author') return a.author.localeCompare(b.author);
                                                if (bookSort === 'genre') {
                                                    const aGenre = Array.isArray(a.genre) ? a.genre[0] : a.genre;
                                                    const bGenre = Array.isArray(b.genre) ? b.genre[0] : b.genre;
                                                    return aGenre.localeCompare(bGenre);
                                                }
                                                if (bookSort === 'proposer') return a.proposedBy.localeCompare(b.proposedBy);
                                                return 0;
                                            })
                                            .map(book => (
                                            <div key={book.id} className="rounded-xl p-6 flex flex-col sm:flex-row gap-6 items-start" style={{background: 'linear-gradient(to right, #FFEDA8, #FFF4CC)'}}>
                                                {book.cover && <img src={book.cover} alt={book.title} className="w-32 h-48 sm:w-24 sm:h-36 object-cover rounded-lg shadow mx-auto sm:mx-0" />}
                                                <div className="flex-1 w-full">
                                                    <h3 className="text-xl font-bold caslon-heading" style={{color: '#003631'}}>{book.title}</h3>
                                                    <p className="text-gray-700 mb-2">by {book.author}</p>
                                                    <div className="flex items-center gap-2 mb-3 flex-wrap">
                                                        {(Array.isArray(book.genre) ? book.genre : [book.genre]).map((g, idx) => (
                                                            <span key={idx} className="px-2 py-1 rounded text-sm text-white" style={{backgroundColor: '#003631'}}>{g}</span>
                                                        ))}
                                                        <span className="text-sm text-gray-600">Proposed by {book.proposedBy}</span>
                                                    </div>
                                                    <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                                                        <button
                                                            onClick={() => handleVote('book', book.id)}
                                                            className={`px-4 py-2 rounded-lg transition-colors ${
                                                                (book.votedBy || []).includes(currentUser)
                                                                    ? 'text-white'
                                                                    : 'bg-white border-2 hover:bg-gray-50'
                                                            }`}
                                                            style={(book.votedBy || []).includes(currentUser) ? {backgroundColor: '#003631'} : {borderColor: '#003631', color: '#003631'}}
                                                        >
                                                            {(book.votedBy || []).includes(currentUser) ? '✓ Voted' : 'Vote'} ({(book.votedBy || []).length})
                                                        </button>
                                                        <span className="text-sm text-gray-600">
                                                            {(book.votedBy || []).length > 0 && `Voted by: ${(book.votedBy || []).join(', ')}`}
                                                        </span>
                                                        <div className="flex gap-3 sm:ml-auto">
                                                            <button
                                                                onClick={() => {
                                                                    const genreStr = Array.isArray(book.genre) ? book.genre.join(', ') : book.genre;
                                                                    setModalData({
                                                                        id: book.id,
                                                                        title: book.title,
                                                                        author: book.author,
                                                                        genre: genreStr,
                                                                        cover: book.cover
                                                                    });
                                                                    setShowModal('editBook');
                                                                }}
                                                                className="text-blue-600 hover:text-blue-800"
                                                            >
                                                                Edit
                                                            </button>
                                                            <button
                                                                onClick={() => handleDelete('book', book.id)}
                                                                className="text-red-500 hover:text-red-700"
                                                            >
                                                                Delete
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'meetings' && (
                                <div className="p-8">
                                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">
                                        <h2 className="text-2xl font-bold caslon-heading" style={{color: '#003631'}}>Meeting Proposals</h2>
                                        <button
                                            onClick={() => setShowModal('meeting')}
                                            className="w-full sm:w-auto px-4 py-2 rounded-lg transition-colors text-white"
                                            style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}
                                        >
                                            + Propose Meeting
                                        </button>
                                    </div>
                                    <div className="grid gap-4">
                                        {meetingProposals.map(meeting => (
                                            <div key={meeting.id} className="rounded-xl p-6" style={{background: 'linear-gradient(to right, #FFEDA8, #FFF4CC)'}}>
                                                <div className="flex flex-col gap-4">
                                                    <div>
                                                        <h3 className="text-xl font-bold caslon-heading" style={{color: '#003631'}}>{meeting.date}</h3>
                                                        <p className="text-gray-700">{meeting.time}</p>
                                                    </div>
                                                    <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                                                        <button
                                                            onClick={() => handleVote('meeting', meeting.id)}
                                                            className={`px-4 py-2 rounded-lg transition-colors ${
                                                                (meeting.votedBy || []).includes(currentUser)
                                                                    ? 'text-white'
                                                                    : 'bg-white border-2 hover:bg-gray-50'
                                                            }`}
                                                            style={(meeting.votedBy || []).includes(currentUser) ? {backgroundColor: '#003631'} : {borderColor: '#003631', color: '#003631'}}
                                                        >
                                                            {(meeting.votedBy || []).includes(currentUser) ? '✓ Voted' : 'Vote'} ({(meeting.votedBy || []).length})
                                                        </button>
                                                        <span className="text-sm text-gray-600">
                                                            {(meeting.votedBy || []).length > 0 && `${(meeting.votedBy || []).join(', ')}`}
                                                        </span>
                                                        <button
                                                            onClick={() => handleDelete('meeting', meeting.id)}
                                                            className="text-red-500 hover:text-red-700 sm:ml-auto"
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold mb-6 caslon-heading" style={{color: '#003631'}}>Past Reads</h2>
                                    <div className="grid gap-4">
                                        {previousBooks.map(book => (
                                            <div key={book.id} className="rounded-xl p-6 flex flex-col sm:flex-row gap-6 items-start" style={{background: 'linear-gradient(to right, #FFEDA8, #FFF4CC)'}}>
                                                <img src={book.cover} alt={book.title} className="w-32 h-48 sm:w-24 sm:h-36 object-cover rounded-lg shadow mx-auto sm:mx-0" />
                                                <div className="flex-1 w-full">
                                                    <h3 className="text-xl font-bold caslon-heading" style={{color: '#003631'}}>{book.title}</h3>
                                                    <p className="text-gray-700 mb-2">by {book.author}</p>
                                                    <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                                                        <span className="px-2 py-1 rounded text-sm text-white w-fit" style={{backgroundColor: '#003631'}}>{book.genre}</span>
                                                        <span className="text-sm text-gray-600">Read on {book.meetingDate}</span>
                                                        <button
                                                            onClick={() => handleDelete('previous', book.id)}
                                                            className="text-red-500 hover:text-red-700 sm:ml-auto w-fit"
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {showModal === 'book' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color: '#003631'}}>Propose a Book</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Book Title" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, title: e.target.value})} />
                                        <input type="text" placeholder="Author" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, author: e.target.value})} />
                                        <input type="text" placeholder="Genres (comma-separated, e.g. Fiction, Classic)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, genre: e.target.value})} />
                                        <input type="text" placeholder="Cover Image URL (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, cover: e.target.value})} />
                                        <button onClick={addBookProposal} className="w-full text-white py-2 rounded-lg transition-colors" style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}>Add Book</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showModal === 'editBook' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color: '#003631'}}>Edit Book</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Book Title" value={modalData.title || ''} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, title: e.target.value})} />
                                        <input type="text" placeholder="Author" value={modalData.author || ''} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, author: e.target.value})} />
                                        <input type="text" placeholder="Genres (comma-separated, e.g. Fiction, Classic)" value={modalData.genre || ''} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, genre: e.target.value})} />
                                        <input type="text" placeholder="Cover Image URL (optional)" value={modalData.cover || ''} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, cover: e.target.value})} />
                                        <button onClick={editBookProposal} className="w-full text-white py-2 rounded-lg transition-colors" style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}>Save Changes</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showModal === 'meeting' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color: '#003631'}}>Propose Meeting Date</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Date (e.g., Feb 15, 2026)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, date: e.target.value})} />
                                        <input type="text" placeholder="Time (e.g., 7:00 PM)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, time: e.target.value})} />
                                        <button onClick={addMeetingProposal} className="w-full text-white py-2 rounded-lg transition-colors" style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}>Add Meeting</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showModal === 'changeBook' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color: '#003631'}}>Change Current Book</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <p className="text-sm text-gray-600 mb-4">The current book will be moved to Past Reads.</p>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Book Title" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, title: e.target.value})} />
                                        <input type="text" placeholder="Author" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, author: e.target.value})} />
                                        <input type="text" placeholder="Genre (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, genre: e.target.value})} />
                                        <input type="text" placeholder="Description (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, description: e.target.value})} />
                                        <input type="text" placeholder="Cover Image URL (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, cover: e.target.value})} />
                                        <button onClick={changeCurrentBook} className="w-full text-white py-2 rounded-lg transition-colors" style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}>Change Book</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showModal === 'changeMeeting' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color: '#003631'}}>Update Next Meeting</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Date and Time (e.g., February 15, 2026 at 7:00 PM)" className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2" style={{borderColor: '#FFEDA8'}}
                                            onChange={(e) => setModalData({...modalData, meetingDate: e.target.value})} />
                                        <button onClick={updateMeetingDate} className="w-full text-white py-2 rounded-lg transition-colors" style={{backgroundColor: '#003631'}}
                                            onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#004d45'}
                                            onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#003631'}>Update Meeting</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BookClubApp />);
    </script>
</body>
</html>
