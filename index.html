<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Book Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://use.typekit.net/af/949f99/00000000000000003b9b3068/27/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=i4&v=3');
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap');

        .caslon-heading {
            font-family: 'adobe-caslon-pro', serif;
            font-style: italic;
            font-weight: 700;
        }

        body, input, select, button, p, span, a, div {
            font-family: 'Crimson Text', serif !important;
        }

        .gingham-bg {
            background-color: #FFEDA8;
            background-image:
                linear-gradient(45deg, #FFF4CC 25%, transparent 25%),
                linear-gradient(-45deg, #FFF4CC 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #FFF4CC 75%),
                linear-gradient(-45deg, transparent 75%, #FFF4CC 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* ── Poll cards (meetings tab) ── */
        .poll-card { background: white; border-radius: 16px; padding: 18px 20px; border: 2px solid #F0E68C; transition: border-color 0.2s, box-shadow 0.2s; position: relative; margin-bottom: 12px; }
        .poll-card.winner { border-color: #003631; box-shadow: 0 0 0 4px #FFEDA830; }
        .winner-badge { position: absolute; top: -11px; right: 16px; background: #003631; color: #FFEDA8; font-size: 0.72rem; padding: 3px 12px; border-radius: 20px; letter-spacing: 0.06em; font-weight: 600; font-style: normal; }
        .poll-track { height: 26px; background: #f5f5f0; border-radius: 8px; overflow: hidden; margin-top: 10px; position: relative; }
        .poll-fill { height: 100%; border-radius: 8px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; padding-left: 10px; }
        .poll-fill.my-vote { background: linear-gradient(to right, #003631, #005548); }
        .poll-fill.others  { background: linear-gradient(to right, #C8E6E3, #DDEEED); }
        .poll-pct { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; color: #888; font-weight: 600; }

        /* ── Avatars ── */
        .avatar { width: 26px; height: 26px; border-radius: 50%; background: #003631; color: #FFEDA8; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; border: 2px solid white; margin-left: -6px; position: relative; cursor: default; }
        .avatar:first-child { margin-left: 0; }
        .avatar[title]:hover::after { content: attr(title); position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); background: #003631; color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 20; }

        /* ── Propose modal rows ── */
        .proposal-row { display: grid; grid-template-columns: 1fr 110px auto; gap: 8px; align-items: end; background: #FAFAF8; border: 2px solid #F0E68C; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s; position: relative; }
        .proposal-row:focus-within { border-color: #003631; }
        .field-group { display: flex; flex-direction: column; gap: 3px; }
        .field-label { font-size: 0.75rem; color: #bbb; font-style: normal; }

        .date-trigger { font-family: 'Crimson Text', serif !important; font-size: 0.95rem; padding: 8px 12px; border: 1.5px solid #EEE; border-radius: 8px; background: white; cursor: pointer; text-align: left; color: #333; width: 100%; transition: border-color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .date-trigger:hover, .date-trigger:focus { border-color: #003631; outline: none; }
        .date-trigger.empty { color: #bbb; }

        .btn-add-row { background: #FAFAF5; border: 2px dashed #D4C97A; color: #A89E50; border-radius: 12px; width: 100%; padding: 10px; font-family: 'Crimson Text', serif !important; font-size: 1rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-add-row:hover { background: #FFFAEB; border-color: #003631; color: #003631; }

        /* ── Calendar popout ── */
        .cal-popout { position: absolute; top: calc(100% + 6px); left: 0; z-index: 9999; background: white; border-radius: 16px; padding: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.18); border: 2px solid #F0E68C; width: 280px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 6px; }
        .cp-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 0.8rem; border: 2px solid transparent; transition: all 0.1s; user-select: none; }
        .cp-cell:hover:not(.cp-empty):not(.cp-past) { background: #FFEDA8; border-color: #003631; }
        .cp-cell.cp-past  { color: #ddd; cursor: not-allowed; }
        .cp-cell.cp-empty { cursor: default; }
        .cp-cell.cp-today { border-color: #003631; color: #003631; font-weight: bold; }
        .cp-cell.cp-sel   { background: #003631; color: white; font-weight: bold; border-color: #003631; }
        .cp-cell.cp-sel:hover { background: #004d45; }
        .cp-hdr { text-align: center; font-size: 0.65rem; color: #ccc; padding: 2px 0; }

        @keyframes fadeSlide { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeSlide 0.22s ease; }
    </style>
</head>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ── Standalone calendar popout helpers (live outside React) ──
        let _cpYear, _cpMonth, _openPopoutRowId;
        const _today = new Date(); _today.setHours(0,0,0,0);

        function _fmtShort(ds) {
            const [y,m,d] = ds.split('-').map(Number);
            return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        }
        function _fmtNice(ds) {
            const [y,m,d] = ds.split('-').map(Number);
            return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
        }
        function _fmtTime(t) {
            if (!t) return '';
            const [h,min] = t.split(':').map(Number);
            return `${h%12||12}:${String(min).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
        }

        function BookClubApp() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const CORRECT_PASSWORD = 'millcreek69';

            const [currentUser, setCurrentUser] = useState(null);
            const [showUserSelect, setShowUserSelect] = useState(true);
            const clubMembers = ['Beth', 'Kate', 'Laura', 'Sam', 'Sarah'];

            const getTabFromURL = () => {
                const hash = window.location.hash.replace('#', '');
                const validTabs = ['current', 'proposals', 'meetings', 'history'];
                return validTabs.includes(hash) ? hash : 'current';
            };
            const [activeTab, setActiveTab] = useState(getTabFromURL());

            const changeTab = (tab) => {
                setActiveTab(tab);
                window.location.hash = tab;
            };

            const tabLabels = { 'current': 'Current', 'proposals': 'Proposals', 'meetings': 'Schedule', 'history': 'History' };

            useEffect(() => {
                const handleHashChange = () => setActiveTab(getTabFromURL());
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const [currentBook, setCurrentBook] = useState(null);
            const [nextMeeting, setNextMeeting] = useState('');
            const [bookProposals, setBookProposals] = useState([]);
            const [meetingProposals, setMeetingProposals] = useState([]);
            const [previousBooks, setPreviousBooks] = useState([]);

            const [showModal, setShowModal] = useState(null);
            const [modalData, setModalData] = useState({});
            const [bookSort, setBookSort] = useState('votes');
            const [genreFilter, setGenreFilter] = useState('all');
            const [proposerFilter, setProposerFilter] = useState('all');

            // Meeting proposal rows state
            const [propRows, setPropRows] = useState([{ id: 1, date: '', time: '19:00', location: '' }]);
            const [propRowCounter, setPropRowCounter] = useState(1);
            const [propError, setPropError] = useState('');

            useEffect(() => {
                const db = window.firebaseDb;
                const ref = window.firebaseRef;
                const onValue = window.firebaseOnValue;

                onValue(ref(db, 'currentBook'),       s => setCurrentBook(s.val()));
                onValue(ref(db, 'nextMeeting'),        s => setNextMeeting(s.val() || 'TBD'));
                onValue(ref(db, 'bookProposals'),      s => {
                    const data = s.val();
                    setBookProposals(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                });
                onValue(ref(db, 'meetingProposals'),   s => {
                    const data = s.val();
                    setMeetingProposals(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                });
                onValue(ref(db, 'previousBooks'),      s => {
                    const data = s.val();
                    setPreviousBooks(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                });
            }, []);

            // ── Book voting / CRUD (unchanged) ──
            const handleVoteBook = (id) => {
                if (!currentUser) return;
                const db = window.firebaseDb; const ref = window.firebaseRef; const update = window.firebaseUpdate;
                const book = bookProposals.find(b => b.id === id);
                if (!book) return;
                const votedBy = book.votedBy || [];
                const newVotedBy = votedBy.includes(currentUser) ? votedBy.filter(n => n !== currentUser) : [...votedBy, currentUser];
                update(ref(db, `bookProposals/${id}`), { votedBy: newVotedBy });
            };

            const handleDelete = (type, id) => {
                const db = window.firebaseDb; const ref = window.firebaseRef; const remove = window.firebaseRemove;
                if (type === 'book')     remove(ref(db, `bookProposals/${id}`));
                if (type === 'meeting')  remove(ref(db, `meetingProposals/${id}`));
                if (type === 'previous') remove(ref(db, `previousBooks/${id}`));
            };

            const addBookProposal = () => {
                if (modalData.title && modalData.author) {
                    const db = window.firebaseDb; const ref = window.firebaseRef; const push = window.firebasePush; const set = window.firebaseSet;
                    const genres = modalData.genre ? modalData.genre.split(',').map(g => g.trim()).filter(g => g) : ['General'];
                    const newRef = push(ref(db, 'bookProposals'));
                    set(newRef, { title: modalData.title, author: modalData.author, genre: genres, cover: modalData.cover || '', votedBy: [], proposedBy: currentUser });
                    setShowModal(null); setModalData({});
                }
            };

            const editBookProposal = () => {
                if (modalData.title && modalData.author) {
                    const db = window.firebaseDb; const ref = window.firebaseRef; const update = window.firebaseUpdate;
                    const genres = modalData.genre ? modalData.genre.split(',').map(g => g.trim()).filter(g => g) : ['General'];
                    const book = bookProposals.find(b => b.id === modalData.id);
                    update(ref(db, `bookProposals/${modalData.id}`), { title: modalData.title, author: modalData.author, genre: genres, cover: modalData.cover || book.cover });
                    setShowModal(null); setModalData({});
                }
            };

            const changeCurrentBook = () => {
                if (modalData.title && modalData.author) {
                    const db = window.firebaseDb; const ref = window.firebaseRef; const push = window.firebasePush; const set = window.firebaseSet;
                    const newPrevRef = push(ref(db, 'previousBooks'));
                    set(newPrevRef, { title: currentBook.title, author: currentBook.author, cover: currentBook.cover, genre: currentBook.genre, meetingDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) });
                    set(ref(db, 'currentBook'), { title: modalData.title, author: modalData.author, cover: modalData.cover || '', description: modalData.description || '', genre: modalData.genre || 'General' });
                    setShowModal(null); setModalData({});
                }
            };

            const updateMeetingDate = () => {
                if (modalData.meetingDate) {
                    const db = window.firebaseDb; const ref = window.firebaseRef; const set = window.firebaseSet;
                    set(ref(db, 'nextMeeting'), modalData.meetingDate);
                    setShowModal(null); setModalData({});
                }
            };

            const clearMeetingDate = () => {
                const db = window.firebaseDb; const ref = window.firebaseRef; const set = window.firebaseSet;
                set(ref(db, 'nextMeeting'), 'TBD');
            };

            // ── Meeting proposal voting ──
            const handleVoteMeeting = (id) => {
                if (!currentUser) return;
                const db = window.firebaseDb; const ref = window.firebaseRef; const update = window.firebaseUpdate;
                const meeting = meetingProposals.find(m => m.id === id);
                if (!meeting) return;
                const votedBy = meeting.votedBy || [];
                const newVotedBy = votedBy.includes(currentUser) ? votedBy.filter(n => n !== currentUser) : [...votedBy, currentUser];
                update(ref(db, `meetingProposals/${id}`), { votedBy: newVotedBy });
            };

            // Confirm a meeting date — writes to nextMeeting in Firebase
            const confirmMeetingDate = (id) => {
                const meeting = meetingProposals.find(m => m.id === id);
                if (!meeting) return;
                const db = window.firebaseDb; const ref = window.firebaseRef; const set = window.firebaseSet;
                const label = _fmtNice(meeting.date) + ' at ' + _fmtTime(meeting.time) + (meeting.location ? ' · ' + meeting.location : '');
                set(ref(db, 'nextMeeting'), label);
            };

            // Submit new meeting proposals (multi-row)
            const submitMeetingProposals = () => {
                const invalid = propRows.filter(r => !r.date);
                if (invalid.length) { setPropError('Please pick a date for every option, or remove the empty ones.'); return; }
                setPropError('');
                const db = window.firebaseDb; const ref = window.firebaseRef; const push = window.firebasePush; const set = window.firebaseSet;
                propRows.forEach(row => {
                    const newRef = push(ref(db, 'meetingProposals'));
                    set(newRef, { date: row.date, time: row.time || '19:00', location: row.location.trim(), votedBy: [currentUser] });
                });
                setShowModal(null);
                setPropRows([{ id: 1, date: '', time: '19:00', location: '' }]);
                setPropRowCounter(1);
            };

            const addPropRow = () => {
                const newId = propRowCounter + 1;
                setPropRowCounter(newId);
                setPropRows(prev => [...prev, { id: newId, date: '', time: '19:00', location: '' }]);
            };

            const removePropRow = (id) => {
                if (propRows.length === 1) return;
                setPropRows(prev => prev.filter(r => r.id !== id));
            };

            const updatePropRow = (id, field, value) => {
                setPropRows(prev => prev.map(r => r.id === id ? { ...r, [field]: value } : r));
            };

            const removeOutdated = () => {
                const today = new Date(); today.setHours(0,0,0,0);
                const db = window.firebaseDb; const ref = window.firebaseRef; const remove = window.firebaseRemove;
                meetingProposals.forEach(m => {
                    if (new Date(m.date) < today) remove(ref(db, `meetingProposals/${m.id}`));
                });
            };

      const deleteAllMeetingProposals = () => {
    if (!meetingProposals.length) return;
    if (window.confirm('Remove all meeting proposals?')) {
        const db = window.firebaseDb;
        const ref = window.firebaseRef;
        const remove = window.firebaseRemove;
        meetingProposals.forEach(m => {
            remove(ref(db, `meetingProposals/${m.id}`));
        });
    }
};

            // ── Render guards ──
            if (!currentBook) {
                return <div className="min-h-screen flex items-center justify-center gingham-bg"><div className="text-2xl" style={{color:'#003631'}}>Loading...</div></div>;
            }

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === CORRECT_PASSWORD) { setIsAuthenticated(true); setPasswordError(''); }
                else { setPasswordError('Incorrect password. Please try again.'); setPasswordInput(''); }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(to bottom right, #FFEDA8, #FFF4CC)'}}>
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">📚</div>
                                <h1 className="text-3xl font-bold mb-2 caslon-heading" style={{color:'#003631'}}>Cozy Book Club</h1>
                                <p className="text-gray-600">Enter password to continue</p>
                            </div>
                            <form onSubmit={handlePasswordSubmit} className="space-y-4">
                                <div>
                                    <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)}
                                        placeholder="Password" className="w-full py-3 px-4 rounded-xl border-2 border-gray-300 focus:outline-none" autoFocus />
                                    {passwordError && <p className="text-red-600 text-sm mt-2">{passwordError}</p>}
                                </div>
                                <button type="submit" className="w-full py-3 px-4 rounded-xl text-white font-medium" style={{backgroundColor:'#003631'}}
                                    onMouseOver={e=>e.currentTarget.style.backgroundColor='#004d45'} onMouseOut={e=>e.currentTarget.style.backgroundColor='#003631'}>
                                    Enter
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (showUserSelect) {
                return (

                                                </div>

                                        </button>

                                                const isWinner  = (meeting.votedBy||[]).length === maxVotes && maxVotes > 0;
                                                const hasVoted  = (meeting.votedBy||[]).includes(currentUser);
                                                const isPast    = meeting.date && new Date(meeting.date) < todayDate;
                                                const pct       = clubMembers.length ? Math.round((meeting.votedBy||[]).length / clubMembers.length * 100) : 0;
                                                const isConfirmed = meeting.date && nextMeeting.startsWith(_fmtNice(meeting.date));

                                                const votedAvatars  = (meeting.votedBy||[]).map(n => `<span class="avatar" title="${n}">${n[0]}</span>`).join('');
                                                const absentAvatars = clubMembers.filter(m => !(meeting.votedBy||[]).includes(m)).map(n => `<span class="avatar" title="${n} (hasn't voted)" style="background:#e8e8e8;color:#bbb;">${n[0]}</span>`).join('');

                                                return (
                                                    <div key={meeting.id} className={`poll-card fade-in${isWinner && !isPast ? ' winner' : ''}`} style={{opacity: isPast ? 0.52 : 1}}>

                                        <input type="text" placeholder="Genres (comma-separated)" value={modalData.genre||''} className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,genre:e.target.value})} />
                                        <input type="text" placeholder="Cover Image URL" value={modalData.cover||''} className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,cover:e.target.value})} />
                                        <button onClick={editBookProposal} className="w-full text-white py-2 rounded-lg" style={{backgroundColor:'#003631'}} onMouseOver={e=>e.currentTarget.style.backgroundColor='#004d45'} onMouseOut={e=>e.currentTarget.style.backgroundColor='#003631'}>Save Changes</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Change Current Book */}
                        {showModal === 'changeBook' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color:'#003631'}}>Change Current Book</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <p className="text-sm text-gray-600 mb-4">The current book will be moved to Past Reads.</p>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Book Title" className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,title:e.target.value})} />
                                        <input type="text" placeholder="Author" className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,author:e.target.value})} />
                                        <input type="text" placeholder="Genre (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,genre:e.target.value})} />
                                        <input type="text" placeholder="Description (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,description:e.target.value})} />
                                        <input type="text" placeholder="Cover Image URL (optional)" className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,cover:e.target.value})} />
                                        <button onClick={changeCurrentBook} className="w-full text-white py-2 rounded-lg" style={{backgroundColor:'#003631'}} onMouseOver={e=>e.currentTarget.style.backgroundColor='#004d45'} onMouseOut={e=>e.currentTarget.style.backgroundColor='#003631'}>Change Book</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Edit Meeting (Current tab) */}
                        {showModal === 'changeMeeting' && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-semibold caslon-heading" style={{color:'#003631'}}>Edit Next Meeting</h3>
                                        <button onClick={() => { setShowModal(null); setModalData({}); }} className="text-gray-400 hover:text-gray-600">✕</button>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Date and Time (e.g. March 21, 2026 at 7:00 PM)" className="w-full px-4 py-2 border rounded-lg focus:outline-none" style={{borderColor:'#FFEDA8'}} onChange={e=>setModalData({...modalData,meetingDate:e.target.value})} />
                                        <button onClick={updateMeetingDate} className="w-full text-white py-2 rounded-lg" style={{backgroundColor:'#003631'}} onMouseOver={e=>e.currentTarget.style.backgroundColor='#004d45'} onMouseOut={e=>e.currentTarget.style.backgroundColor='#003631'}>Update Meeting</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── Propose Meeting Dates modal ── */}
                        {showModal === 'meeting' && (
                            <MeetingProposeModal
                                propRows={propRows}
                                propError={propError}
                                onAddRow={addPropRow}
                                onRemoveRow={removePropRow}
                                onUpdateRow={updatePropRow}
                                onSubmit={submitMeetingProposals}
                                onClose={() => { setShowModal(null); setPropError(''); }}
                            />
                        )}
                    </div>
                </div>
            );
        }

        // ── Meeting proposal modal as a separate component (needed for calendar popout DOM work) ──
        function MeetingProposeModal({ propRows, propError, onAddRow, onRemoveRow, onUpdateRow, onSubmit, onClose }) {
            const todayD = new Date(); todayD.setHours(0,0,0,0);
            const [openPopout, setOpenPopout] = useState(null); // rowId or null
            const [cpY, setCpY] = useState(todayD.getFullYear());
            const [cpM, setCpM] = useState(todayD.getMonth());
            const overlayRef = useRef(null);

            const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

            const togglePopout = (rowId, currentDate) => {
                if (openPopout === rowId) { setOpenPopout(null); return; }
                if (currentDate) {
                    const [y,m] = currentDate.split('-').map(Number);
                    setCpY(y); setCpM(m-1);
                } else {
                    setCpY(todayD.getFullYear()); setCpM(todayD.getMonth());
                }
                setOpenPopout(rowId);
            };

            const pickDate = (rowId, ds) => {
                onUpdateRow(rowId, 'date', ds);
                setOpenPopout(null);
            };

            const cpNav = (dir) => {
                let nm = cpM + dir, ny = cpY;
                if (nm < 0)  { nm = 11; ny--; }
                if (nm > 11) { nm = 0;  ny++; }
                setCpM(nm); setCpY(ny);
            };

            const buildCal = (rowId, selDate) => {
                const firstDay = new Date(cpY, cpM, 1).getDay();
                const days = new Date(cpY, cpM+1, 0).getDate();
                let cells = [];
                for (let i=0;i<firstDay;i++) cells.push(<div key={`e${i}`} className="cp-cell cp-empty" />);
                for (let d=1;d<=days;d++) {
                    const ds = `${cpY}-${String(cpM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dd = new Date(cpY,cpM,d);
                    const isPast  = dd < todayD;
                    const isToday = dd.getTime()===todayD.getTime();
                    const isSel   = ds===selDate;
                    let cls = 'cp-cell' + (isPast?' cp-past':'') + (isToday&&!isSel?' cp-today':'') + (isSel?' cp-sel':'');
                    cells.push(<div key={ds} className={cls} onClick={!isPast?()=>pickDate(rowId,ds):undefined}>{d}</div>);
                }
                return cells;
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
                    ref={overlayRef}
                    onClick={e => { if(e.target===overlayRef.current){onClose();} else {setOpenPopout(null);} }}>
                    <div className="bg-white rounded-2xl p-6 max-w-lg w-full" style={{maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-1">
                            <h3 className="text-xl font-semibold caslon-heading" style={{color:'#003631'}}>Propose Meeting Options</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
                        </div>
                        <p style={{color:'#aaa',fontSize:'0.88rem',marginBottom:'16px'}}>Add one or more options — each can have its own date, time, and location.</p>

                        {/* Column headers */}
                        <div style={{display:'grid',gridTemplateColumns:'1fr 110px auto',gap:'8px',padding:'0 14px',marginBottom:'4px'}}>
                            <span className="field-label">DATE</span>
                            <span className="field-label">TIME</span>
                            <span className="field-label" style={{visibility:'hidden'}}>DEL</span>
                        </div>

                        {/* Rows */}
                        {propRows.map(row => (
                            <div key={row.id} className="proposal-row" onClick={e=>e.stopPropagation()}>
                                {/* Date */}
                                <div className="field-group" style={{position:'relative'}}>
                                    <label className="field-label">📅 Date</label>
                                    <button className={`date-trigger${row.date?'':' empty'}`}
                                        onClick={e=>{e.stopPropagation(); togglePopout(row.id, row.date);}}>
                                        {row.date ? _fmtShort(row.date) : 'Pick a date…'}
                                    </button>
                                    {/* Calendar popout */}
                                    {openPopout===row.id && (
                                        <div className="cal-popout" onClick={e=>e.stopPropagation()}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
                                                <button onClick={()=>cpNav(-1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.2rem',color:'#003631',padding:'0 4px'}}>‹</button>
                                                <span className="caslon-heading" style={{color:'#003631',fontSize:'0.95rem'}}>{MONTHS[cpM]} {cpY}</span>
                                                <button onClick={()=>cpNav(1)}  style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.2rem',color:'#003631',padding:'0 4px'}}>›</button>
                                            </div>
                                            <div className="cal-grid" style={{marginBottom:'4px'}}>
                                                {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cp-hdr">{d}</div>)}
                                            </div>
                                            <div className="cal-grid">{buildCal(row.id, row.date)}</div>
                                        </div>
                                    )}
                                </div>

                                {/* Time */}
                                <div className="field-group">
                                    <label className="field-label">⏰ Time</label>
                                    <input type="time" value={row.time}
                                        onChange={e=>onUpdateRow(row.id,'time',e.target.value)}
                                        style={{width:'100%'}} />
                                </div>

                                {/* Delete row */}
                                <div style={{display:'flex',alignItems:'flex-end',paddingBottom:'2px'}}>
                                    <button onClick={()=>onRemoveRow(row.id)}
                                        style={{background:'none',border:'none',cursor:propRows.length===1?'default':'pointer',color:propRows.length===1?'#eee':'#ccc',fontSize:'1.2rem',lineHeight:1,padding:'6px'}}
                                        disabled={propRows.length===1} title="Remove this option">✕</button>
                                </div>

                                {/* Location — full width */}
                                <div className="field-group" style={{gridColumn:'1/-1',marginTop:'2px'}}>
                                    <label className="field-label">📍 Location <span style={{color:'#ddd'}}>(optional)</span></label>
                                    <input type="text" value={row.location}
                                        placeholder="e.g. Sarah's place, Zoom, TBD…"
                                        onChange={e=>onUpdateRow(row.id,'location',e.target.value)}
                                        style={{width:'100%'}} />
                                </div>
                            </div>
                        ))}

                        <button className="btn-add-row" onClick={onAddRow}>
                            <span style={{fontSize:'1.2rem',lineHeight:1}}>+</span> Add another option
                        </button>

                        {propError && <p style={{color:'#c00',fontSize:'0.85rem',marginTop:'10px'}}>{propError}</p>}

                        <div style={{marginTop:'18px',display:'flex',gap:'10px'}}>
                            <button onClick={onSubmit} className="flex-1 text-white py-2 rounded-lg" style={{backgroundColor:'#003631'}}
                                onMouseOver={e=>e.currentTarget.style.backgroundColor='#004d45'} onMouseOut={e=>e.currentTarget.style.backgroundColor='#003631'}>
                                Submit proposals
                            </button>
                            <button onClick={onClose} className="px-4 py-2 rounded-lg" style={{backgroundColor:'white',color:'#003631',border:'2px solid #003631'}}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BookClubApp />);
    </script>
</body>
</html>
